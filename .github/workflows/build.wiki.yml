name: Update Wiki

on:
  workflow_run:
    workflows:
      - Release
    types:
      - completed
  workflow_dispatch:

env:
  GH_PAT: ${{ secrets.UPDATEWIKITOKEN }}

concurrency:
  group: ${{ github.workflow }}-${{ github.event_name == 'workflow_run' && github.event.workflow_run.head_branch || github.ref_name || github.run_id }}
  cancel-in-progress: true

jobs:
  updatewiki:
    if: ${{ github.event_name == 'workflow_dispatch' || (github.event_name == 'workflow_run' && github.event.workflow_run.conclusion == 'success') }}
    permissions:
      contents: read
    runs-on: "ubuntu-24.04"

    steps:
      - name: Checkout Sources
        uses: actions/checkout@v6
        with:
          fetch-depth: 0
          fetch-tags: true
          ref: ${{ github.event_name == 'workflow_run' && github.event.workflow_run.head_branch || github.ref_name }}

      - name: Setup PHP with PECL extension
        uses: shivammathur/setup-php@v2
        with:
          php-version: "8.5"
          extensions: dom, curl, libxml, mbstring, zip, pcntl, pdo, bcmath, intl, gd, exif, iconv, imagick, json, xdebug
          coverage: none

      - name: Get Composer Cache Directory
        id: composer-cache
        run: |
          echo "dir=$(composer config cache-files-dir)" >> $GITHUB_OUTPUT

      - uses: actions/cache@v5
        with:
          path: ${{ steps.composer-cache.outputs.dir }}
          key: ${{ runner.os }}-8.5-composer-${{ hashFiles('**/composer.json') }}
          restore-keys: |
            ${{ runner.os }}-8.5-composer-${{ hashFiles('**/composer.json') }}
            ${{ runner.os }}-8.5-composer-

      - name: Install composer dependencies
        run: |
          composer config -g github-oauth.github.com ${{ secrets.GITHUB_TOKEN }}
          composer update --no-interaction --prefer-dist --no-progress

      - name: Update Wiki
        run: |
          php -f make/genmethoddocs.php
          git clone https://$GH_PAT@github.com/horstoeko/invoicesuite.wiki.git wiki
          if compgen -G "make/classes/*.md" > /dev/null; then
            mv make/classes/*.md wiki/
          else
            echo "No method documentation files were generated. Skipping copy step."
          fi
          cd wiki
          git config user.name "HorstOeko"
          git config user.email "horstoeko@erling.com.de"
          if [ -n "$(git status --porcelain)" ]; then
            git add -A
            git commit -m "Automatische Aktualisierung des Wikis"
            git push
          else
            echo "No changes found. Skipping."
          fi
