name: Continuous Integration (Windows)

on:
  push:
    tags-ignore:
      - "**"
    branches:
      - "**"
    paths-ignore:
      - "**.md"
      - ".github/**"
      - "examples/**"
      - "make/**"
  pull_request:
    types:
      - opened
    branches:
      - "master"
  workflow_dispatch:

env:
  VALIDATORURL: https://github.com/itplr-kosit/validator/releases/download/v1.5.0/validator-1.5.0-distribution.zip
  VALIDATORSCENARIOURL: https://github.com/itplr-kosit/validator-configuration-xrechnung/releases/download/release-2025-03-21/validator-configuration-xrechnung_3.0.2_2025-03-21.zip
  VALIDATORPATH: build/validator
  VALIDATORZIPFILENAME: validator.zip
  VALIDATORSCENARIOZIPFILENAME: validator-configuration.zip
  VALIDATORJARFILENAME: validationtool-1.5.0-standalone.jar
  VALIDATORSCENARIOFILENAME: scenarios.xml
  VERAPDFURL: https://software.verapdf.org/rel/verapdf-installer.zip
  VERAPDFPATH: build/verapdf
  VERAPDFZIPFILENAME: verapdf.zip

jobs:
  build-windows:
    permissions: write-all
    runs-on: ${{ matrix.operating-system }}
    strategy:
      matrix:
        operating-system: ["windows-2022"]
        phpversion: ["8.1", "8.2", "8.3", "8.4", "8.5"]

    steps:
      - name: Checkout Sources
        uses: actions/checkout@v6

      - name: Setup PHP with PECL extension
        uses: shivammathur/setup-php@v2
        with:
          php-version: ${{ matrix.phpversion }}
          extensions: dom, curl, libxml, mbstring, zip, pcntl, pdo, bcmath, intl, gd, exif, iconv, imagick, json, xdebug
          coverage: xdebug

      - name: Set up JDK 11
        uses: actions/setup-java@v5
        with:
          java-version: "11"
          distribution: "temurin"

      - name: Get Composer Cache Directory
        id: composer-cache
        shell: pwsh
        run: |
          $dir = composer config cache-files-dir
          "dir=$dir" >> $env:GITHUB_OUTPUT

      - name: Cache Composer dependencies
        uses: actions/cache@v4
        with:
          path: ${{ steps.composer-cache.outputs.dir }}
          key: ${{ runner.os }}-${{ matrix.phpversion }}-composer-${{ hashFiles('**/composer.json') }}
          restore-keys: |
            ${{ runner.os }}-${{ matrix.phpversion }}-composer-${{ hashFiles('**/composer.json') }}
            ${{ runner.os }}-${{ matrix.phpversion }}-composer-

      - name: Install composer dependencies
        shell: pwsh
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          composer config -g github-oauth.github.com $env:GITHUB_TOKEN
          composer update --no-interaction --prefer-dist

      - name: Prepare Directories
        shell: pwsh
        run: |
          $dirs = @(
            "build/builddoc",
            "build/doc",
            "build/coverage",
            "build/coverage-html",
            "build/logs",
            "build/pdepend",
            "build/dist",
            "build/phpdoc"
          )
          foreach ($d in $dirs) {
            New-Item -ItemType Directory -Path $d -Force | Out-Null
          }

      - name: Run Lint
        shell: pwsh
        run: |
          Write-Host "Lint src/"
          if (Test-Path "src") {
            Get-ChildItem -Path "src" -Recurse -Include *.php |
              ForEach-Object {
                php -l $_.FullName
              }
          }

          Write-Host "Lint tests/"
          if (Test-Path "tests") {
            Get-ChildItem -Path "tests" -Recurse -Include *.php |
              ForEach-Object {
                php -l $_.FullName
              }
          }

      - name: Run PHP-CS-Fixer (dry-run)
        shell: pwsh
        run: |
          php vendor/bin/php-cs-fixer fix `
            --config=build/phpcsfixer.php `
            --dry-run `
            --diff `
            --verbose `
            --using-cache=no `
            --no-interaction

      - name: Run PHPStan
        shell: pwsh
        run: |
          php vendor/bin/phpstan analyze `
            -c build/phpstan.neon `
            --autoload-file=vendor/autoload.php `
            --no-interaction `
            --no-progress `
            --error-format=checkstyle `
            > build/logs/checkstyle_phpstan_windows.xml

      - name: Run Tests (PHPUnit)
        shell: pwsh
        env:
          XDEBUG_MODE: coverage
        run: |
          php vendor/bin/phpunit --stop-on-failure --configuration build/phpunit.xml

      - name: Cache Key (Schematron)
        id: hash-validator
        shell: pwsh
        run: |
          $text = "$($env:VALIDATORURL) $($env:VALIDATORSCENARIOURL)"
          $bytes = [System.Text.Encoding]::UTF8.GetBytes($text)
          $sha = [System.Security.Cryptography.SHA256]::Create()
          $hashBytes = $sha.ComputeHash($bytes)
          $hashHex = -join ($hashBytes | ForEach-Object { $_.ToString("x2") })
          $hash = $hashHex.Substring(0,16)
          "hash=$hash" >> $env:GITHUB_OUTPUT

      - name: Cache Application (Schematron)
        id: cache-validator
        uses: actions/cache@v4
        with:
          path: ${{ env.VALIDATORPATH }}
          key: ${{ runner.os }}-${{ matrix.phpversion }}-validator-${{ steps.hash-validator.outputs.hash }}

      - name: Download Application (Schematron)
        if: steps.cache-validator.outputs.cache-hit != 'true'
        shell: pwsh
        run: |
          if (Test-Path $env:VALIDATORPATH) {
            Remove-Item -Recurse -Force $env:VALIDATORPATH
          }
          New-Item -ItemType Directory -Path $env:VALIDATORPATH -Force | Out-Null

          $validatorZip = Join-Path $env:VALIDATORPATH $env:VALIDATORZIPFILENAME
          $scenarioZip  = Join-Path $env:VALIDATORPATH $env:VALIDATORSCENARIOZIPFILENAME

          Invoke-WebRequest -Uri $env:VALIDATORURL -OutFile $validatorZip
          Invoke-WebRequest -Uri $env:VALIDATORSCENARIOURL -OutFile $scenarioZip

          Expand-Archive -Path $validatorZip -DestinationPath $env:VALIDATORPATH -Force
          Expand-Archive -Path $scenarioZip -DestinationPath $env:VALIDATORPATH -Force

      - name: Run Tests (Schematron)
        shell: pwsh
        run: |
          $jar      = Join-Path $env:VALIDATORPATH $env:VALIDATORJARFILENAME
          $scenario = Join-Path $env:VALIDATORPATH $env:VALIDATORSCENARIOFILENAME
          if (-not (Test-Path $jar)) {
            Write-Error "Validator JAR not found at $jar"
            exit 1
          }
          java -jar $jar -r $env:VALIDATORPATH -s $scenario tests/assets/00_case_comfort_simple.xml
          java -jar $jar -r $env:VALIDATORPATH -s $scenario tests/assets/00_case_comfort_simple_dto.xml

      - name: Cache Key (VeraPDF)
        id: hash-verapdf
        shell: pwsh
        run: |
          $text = "$($env:VERAPDFURL)"
          $bytes = [System.Text.Encoding]::UTF8.GetBytes($text)
          $sha = [System.Security.Cryptography.SHA256]::Create()
          $hashBytes = $sha.ComputeHash($bytes)
          $hashHex = -join ($hashBytes | ForEach-Object { $_.ToString("x2") })
          $hash = $hashHex.Substring(0,16)
          "hash=$hash" >> $env:GITHUB_OUTPUT

      - name: Cache Application (VeraPDF)
        id: cache-verapdf
        uses: actions/cache@v4
        with:
          path: ${{ env.VERAPDFPATH }}
          key: ${{ runner.os }}-${{ matrix.phpversion }}-verapdf-${{ steps.hash-verapdf.outputs.hash }}

      - name: Download Application (VeraPDF)
        if: steps.cache-verapdf.outputs.cache-hit != 'true'
        shell: pwsh
        run: |
          if (Test-Path $env:VERAPDFPATH) {
            Remove-Item -Recurse -Force $env:VERAPDFPATH
          }
          New-Item -ItemType Directory -Path $env:VERAPDFPATH -Force | Out-Null
          $zipFile = Join-Path $env:VERAPDFPATH $env:VERAPDFZIPFILENAME
          Invoke-WebRequest -Uri $env:VERAPDFURL -OutFile $zipFile
          Expand-Archive -Path $zipFile -DestinationPath $env:VERAPDFPATH -Force
          Remove-Item $zipFile -Force

      - name: Run Tests (VeraPDF)
        continue-on-error: true
        shell: pwsh
        run: |
          Set-StrictMode -Version Latest

          Write-Host "Searching veraPDF installer JAR..."
          $installer = Get-ChildItem -Path $env:VERAPDFPATH -Recurse -Filter *.jar | Select-Object -First 1

          if (-not $installer) {
            Write-Error "No veraPDF installer JAR found in $env:VERAPDFPATH"
            exit 1
          }

          Write-Host "veraPDF installer found at $($installer.FullName)"

          $installXmlPath = Join-Path $env:VERAPDFPATH "install.xml"
          $installXmlContent = @"
                <?xml version="1.0" encoding="UTF-8" standalone="no"?>
                <AutomatedInstallation langpack="eng">
                    <com.izforge.izpack.panels.htmlhello.HTMLHelloPanel id="welcome"/>
                    <com.izforge.izpack.panels.target.TargetPanel id="install_dir">
                        <installpath>$(Get-Location)/$($env:VERAPDFPATH)</installpath>
                    </com.izforge.izpack.panels.target.TargetPanel>
                    <com.izforge.izpack.panels.packs.PacksPanel id="sdk_pack_select">
                        <pack index="0" name="veraPDF Mac and *nix Scripts" selected="true"/>
                        <pack index="1" name="veraPDF Validation model" selected="true"/>
                        <pack index="2" name="veraPDF Documentation" selected="true"/>
                        <pack index="3" name="veraPDF Sample Plugins" selected="true"/>
                    </com.izforge.izpack.panels.packs.PacksPanel>
                    <com.izforge.izpack.panels.install.InstallPanel id="install"/>
                    <com.izforge.izpack.panels.finish.FinishPanel id="finish"/>
                </AutomatedInstallation>
                "@
          $installXmlContent | Set-Content -Path $installXmlPath -Encoding UTF8

          Write-Host "Installing veraPDF..."
          java -jar $installer.FullName $installXmlPath

          Write-Host "Searching veraPDF CLI..."
          $verapdfExe = Get-ChildItem -Path $env:VERAPDFPATH -Recurse |
            Where-Object { $_.Name -like 'verapdf*' -and ($_.Extension -in '.bat', '.cmd', '.exe', '') } |
            Select-Object -First 1

          if (-not $verapdfExe) {
            Write-Error "veraPDF executable not found under $env:VERAPDFPATH"
            exit 1
          }

          Write-Host "veraPDF executable: $($verapdfExe.FullName)"

          $pdfFiles = @(
            "tests/assets/00_case_comfort_simple.pdf",
            "tests/assets/00_case_extended_simple.pdf"
          )

          foreach ($pdf in $pdfFiles) {
            Write-Host "Running PDF validation for $pdf ..."
            $result = & $verapdfExe.FullName --format text --flavour 3b --loglevel 0 $pdf
            Write-Host "Result:"
            Write-Host $result

            if ($result -notlike 'PASS*') {
              Write-Error "PDF validation not passed for $pdf"
              exit 1
            } else {
              Write-Host "PDF validation passed for $pdf"
            }
          }

      - name: Publish Build Logs (Windows)
        uses: actions/upload-artifact@v5
        with:
          name: Build log artifacts (Windows PHP ${{ matrix.phpversion }})
          path: build/logs
