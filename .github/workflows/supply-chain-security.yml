name: Supply Chain Security

on:
  push:
    branches:
      - master
  pull_request:
    branches:
      - master
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  supply-chain:
    name: Composer audit, SBOM, and license report
    runs-on: ubuntu-latest
    env:
      COMPOSER_PROCESS_TIMEOUT: 0
      COMPOSER_NO_INTERACTION: 1
      COMPOSER_NO_AUDIT: 1
      COMPOSER_AUDIT_ABANDONED: report

    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Set up PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.2'
          coverage: none
          tools: composer:v2

      - name: Get Composer Cache Directory
        id: composer-cache
        shell: bash
        run: |
          echo "dir=$(composer config cache-files-dir)" >> "$GITHUB_OUTPUT"

      - name: Cache Composer downloads
        uses: actions/cache@v5
        with:
          path: ${{ steps.composer-cache.outputs.dir }}
          key: ${{ runner.os }}-composer-supply-chain-${{ hashFiles('**/composer.json', '**/composer.lock') }}
          restore-keys: |
            ${{ runner.os }}-composer-supply-chain-${{ hashFiles('**/composer.json') }}
            ${{ runner.os }}-composer-supply-chain-

      - name: Prepare build directories
        shell: bash
        run: |
          mkdir -p build/supply-chain

      - name: Resolve Composer dependencies
        shell: bash
        run: |
          if [ -f composer.lock ]; then
            composer install --prefer-dist --no-progress
          else
            composer update --prefer-dist --no-progress
          fi

      - name: Run Composer audit
        id: composer-audit
        shell: bash
        run: |
          set +e
          composer audit --no-dev --abandoned=report --format=json > build/supply-chain/composer-audit.json
          audit_json_exit=$?
          composer audit --no-dev --abandoned=report --format=summary > build/supply-chain/composer-audit.txt
          audit_summary_exit=$?
          set -e

          audit_exit=$audit_json_exit
          if [ "$audit_summary_exit" -gt "$audit_exit" ]; then
            audit_exit=$audit_summary_exit
          fi

          echo "exit_code=$audit_exit" >> "$GITHUB_OUTPUT"

      - name: Generate Composer license report
        shell: bash
        run: |
          composer licenses --no-dev --format=json > build/supply-chain/composer-licenses.json
          composer licenses --no-dev --format=summary > build/supply-chain/composer-licenses.txt

      - name: Allow CycloneDX Composer plugin
        shell: bash
        run: |
          composer global config --no-plugins allow-plugins.cyclonedx/cyclonedx-php-composer true

      - name: Install CycloneDX Composer plugin
        shell: bash
        run: |
          composer global require --no-interaction --no-progress cyclonedx/cyclonedx-php-composer
      - name: Generate local CycloneDX SBOM
        shell: bash
        run: |
          composer CycloneDX:make-sbom \
            --output-format=JSON \
            --output-file=build/supply-chain/composer-sbom.cdx.json \
            --omit=dev

      - name: Upload supply-chain reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: supply-chain-reports
          path: build/supply-chain/
          if-no-files-found: error

      - name: Fail on Composer vulnerabilities
        if: steps.composer-audit.outputs.exit_code != '0'
        shell: bash
        run: |
          echo "Composer audit reported security advisories. Abandoned packages are reported separately and do not fail this workflow. See the uploaded supply-chain-reports artifact for details."
          exit 1
